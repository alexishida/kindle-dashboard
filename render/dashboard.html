<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Dashboard Render</title>
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var captureScale = Number(params.get('captureScale') || '');
    if (captureScale > 0 && captureScale <= 1) {
      document.documentElement.className = 'capture-landscape';
      document.documentElement.style.setProperty('--capture-scale', String(captureScale));
    } else if (params.get('desktop') === '1') {
      document.documentElement.className = 'desktop';
    }
  })();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --capture-scale: 1; }
  html, body { width: 1072px; height: 1448px; background: #fff; color: #000; overflow: hidden; }
  body { font-family: Helvetica, Arial, sans-serif; -webkit-font-smoothing: none; }

  /* O framebuffer do PW3 é retrato (1072x1448) e o fbink não rotaciona (canRotate=0).
     Renderizamos o conteúdo em paisagem (1448x1072) e giramos 90° para encaixar no
     retrato — assim, virando o Kindle de lado, lê-se em paisagem. */
  .stage {
    position: absolute; top: 50%; left: 50%;
    width: 1448px; height: 1072px;
    transform: translate(-50%, -50%) rotate(90deg);
    transform-origin: center center;
    padding: 28px 36px; display: flex; flex-direction: column;
  }
  html.desktop, html.desktop body { width: 100%; height: 100%; }
  html.desktop .stage {
    position: relative; top: auto; left: auto;
    width: 100vw; height: 100vh;
    transform: none;
  }
  html.capture-landscape,
  html.capture-landscape body {
    width: calc(1448px * var(--capture-scale));
    height: calc(1072px * var(--capture-scale));
  }
  html.capture-landscape .stage {
    position: absolute; top: 0; left: 0;
    width: 1448px; height: 1072px;
    transform: scale(var(--capture-scale));
    transform-origin: top left;
  }

  header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 6px solid #000; padding-bottom: 16px; margin-bottom: 26px;
  }
  h1 { font-size: 52px; letter-spacing: -1px; }
  .stamp { font-size: 28px; text-align: right; }

  .cols { display: flex; gap: 28px; flex: 1; }
  .card { flex: 1; border: 4px solid #000; padding: 24px 26px; display: flex; flex-direction: column; }
  .card h2 {
    display: flex; align-items: center; gap: 16px;
    font-size: 40px; margin-bottom: 22px; border-bottom: 3px solid #000; padding-bottom: 10px;
  }
  .card h2 .logo { width: 48px; height: 48px; flex: 0 0 48px; fill: #000; }

  .row { margin: 18px 0; }
  .row .label { display: flex; justify-content: space-between; font-size: 30px; font-weight: bold; margin-bottom: 8px; }
  .bar { height: 40px; border: 3px solid #000; }
  .bar > i { display: block; height: 100%; background: #000; }
  .reset { font-size: 34px; margin-top: 10px; }

  .sub { font-size: 28px; margin-top: 14px; line-height: 1.35; }
  .big { font-size: 46px; font-weight: bold; margin-top: auto; }
  .dim { opacity: 0.55; }
</style>
</head>
<body>
  <div class="stage">
    <header>
      <h1>Token Dashboard</h1>
      <div class="stamp" id="stamp">—</div>
    </header>
    <div class="cols" id="cols"></div>
  </div>

<script>
(function () {
  var API = '/api/usage';

  // Logos monocromáticos (alto contraste p/ e-ink), inline pra não depender de arquivos servidos.
  var LOGOS = {
    claude: '<svg class="logo" viewBox="0 0 24 24" aria-hidden="true"><g stroke="#000" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="12" x2="12.00" y2="2.00"/><line x1="12" y1="12" x2="15.68" y2="6.28"/><line x1="12" y1="12" x2="20.37" y2="8.18"/><line x1="12" y1="12" x2="19.13" y2="13.02"/><line x1="12" y1="12" x2="19.41" y2="18.42"/><line x1="12" y1="12" x2="13.86" y2="18.33"/><line x1="12" y1="12" x2="9.32" y2="21.12"/><line x1="12" y1="12" x2="6.71" y2="16.58"/><line x1="12" y1="12" x2="2.70" y2="13.34"/><line x1="12" y1="12" x2="5.72" y2="9.13"/><line x1="12" y1="12" x2="7.19" y2="4.51"/></g></svg>',
    codex: '<svg class="logo" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/></svg>'
  };

  function money(cents, cur) {
    var v = (cents / 100).toFixed(2).replace('.', ',');
    return (cur === 'BRL' ? 'R$ ' : (cur || '') + ' ') + v;
  }

  function formatReset(value) {
    if (!value) return '';
    var d = new Date(value);
    if (isNaN(d.getTime())) return '';
    return 'Reinicia: <strong>' +
      d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
      ' às ' +
      d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) +
      '</strong>';
  }

  function bar(name, pct, resetsAt) {
    var p = Math.max(0, Math.min(100, pct));
    var reset = formatReset(resetsAt);
    return '<div class="row"><div class="label"><span>' + name + '</span><span>' +
           (Math.round(pct * 10) / 10) + '%</span></div>' +
           '<div class="bar"><i style="width:' + p + '%"></i></div>' +
           (reset ? '<div class="reset">' + reset + '</div>' : '') +
           '</div>';
  }

  function card(t) {
    var logo = LOGOS[t.tool] || '';
    var h = '<div class="card"><h2>' + logo + '<span>' + t.label + '</span></h2>';
    if (t.confidence === 'error' || t.confidence === 'cooldown') {
      var e = t.error || '';
      var msg = /401/.test(e) ? 'token expirado — rode `claude`'
              : /429/.test(e) ? 'limite atingido — aguardando'
              : t.confidence === 'cooldown' ? 'aguardando intervalo'
              : (e || 'indisponível');
      return h + '<div class="sub" style="margin-top:24px">⚠ indisponível</div>' +
             '<div class="sub dim">' + msg + '</div></div>';
    }
    (t.windows || []).forEach(function (w) { h += bar(w.name, w.pct, w.resets_at); });
    if (t.note) h += '<div class="sub dim">⚠ ' + t.note + '</div>';
    if (t.extra) {
      h += '<div class="sub">Extra: ' + money(t.extra.used_credits, t.extra.currency) +
           ' / ' + money(t.extra.monthly_limit, t.extra.currency) +
           '<br>(' + (Math.round(t.extra.pct * 10) / 10) + '% usado)</div>';
    }
    if (t.tokens) h += '<div class="sub">Tokens: ' + t.tokens.total.toLocaleString('pt-BR') + '</div>';
    if (t.spend) {
      h += '<div class="big">US$ ' + t.spend.usd.toFixed(4) + '</div>' +
           '<div class="sub dim">' + t.spend.sessions + ' sessões · limites do Go sem API</div>';
    }
    return h + '</div>';
  }

  function render(data) {
    document.getElementById('cols').innerHTML = (data.tools || []).map(card).join('');
    var d = new Date(data.updatedAt || Date.now());
    document.getElementById('stamp').textContent =
      d.toLocaleDateString('pt-BR') + '  ' + d.toLocaleTimeString('pt-BR').slice(0, 5);
    document.title = 'READY'; // sinal para o renderizador headless
  }

  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '?_=' + Date.now(), true);
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4 && xhr.status >= 200 && xhr.status < 300) {
      render(JSON.parse(xhr.responseText));
    }
  };
  xhr.send();
})();
</script>
</body>
</html>
